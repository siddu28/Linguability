# ============================================================
# CD Pipeline - Linguability
# Handles deployment verification and notifications
# Note: Vercel & Render auto-deploy on push to main
# ============================================================

name: CD - Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allow manual trigger

jobs:
  # ==================== Pre-Deploy Tests ====================
  pre-deploy-tests:
    name: Pre-Deploy Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🧪 Run all tests
        working-directory: ./frontend
        run: npm test
        env:
          CI: true

      - name: 🏗️ Verify build
        working-directory: ./frontend
        run: npm run build

  # ==================== Deploy Status ====================
  deploy-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: pre-deploy-tests
    if: success()

    steps:
      - name: ✅ Tests Passed - Deploying
        run: |
          echo "============================================"
          echo "✅ All tests passed!"
          echo "============================================"
          echo ""
          echo "🚀 Deployment Status:"
          echo "   Frontend (Vercel): Auto-deploying..."
          echo "   Backend (Render):  Auto-deploying..."
          echo ""
          echo "📍 URLs:"
          echo "   Frontend: Check Vercel Dashboard"
          echo "   Backend:  Check Render Dashboard"
          echo "============================================"

  # ==================== Trigger Render Deploy (Optional) ====================
  # Uncomment if you want to manually trigger Render deploys
  # trigger-render-deploy:
  #   name: Trigger Render Deploy
  #   runs-on: ubuntu-latest
  #   needs: pre-deploy-tests
  #   if: success()
  #
  #   steps:
  #     - name: 🚀 Deploy to Render
  #       run: |
  #         curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
  #       env:
  #         RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  # ==================== Failure Notification ====================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: pre-deploy-tests
    if: failure()

    steps:
      - name: ❌ Tests Failed
        run: |
          echo "============================================"
          echo "❌ DEPLOYMENT BLOCKED - Tests Failed!"
          echo "============================================"
          echo ""
          echo "Please fix the failing tests before merging."
          echo "Run 'npm test' locally to see failures."
          echo "============================================"

      # Optional: Send Slack notification
      # - name: Send Slack Notification
      #   uses: 8398a7/action-slack@v3
      #   with:
      #     status: failure
      #     fields: repo,message,commit,author,action,eventName,ref,workflow
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
