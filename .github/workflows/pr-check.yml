# ============================================================
# PR Check - Linguability
# Required status check that must pass before merging
# ============================================================

name: PR Check

on:
  pull_request:
    branches: [main, master]
    types: [opened, synchronize, reopened]

jobs:
  # ==================== Required Checks ====================
  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: 🧪 Run tests
        working-directory: ./frontend
        run: npm test
        env:
          CI: true

      - name: 🏗️ Verify build
        working-directory: ./frontend
        run: npm run build

  # ==================== PR Summary ====================
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: required-checks
    if: always()
    
    steps:
      - name: 📋 Generate Summary
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.required-checks.result }}" == "success" ]; then
            echo "✅ **All checks passed!** Ready to merge." >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Checks failed.** Please fix the issues before merging." >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Run:" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Frontend Tests (Vitest)" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Build Verification" >> $GITHUB_STEP_SUMMARY
