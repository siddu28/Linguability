# ============================================================
# CI Pipeline - Linguability
# Runs tests and linting on every Pull Request
# ============================================================

name: CI - Test & Lint

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

jobs:
  # ==================== Frontend Tests ====================
  frontend-test:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test
        env:
          CI: true

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: frontend/coverage/
          retention-days: 7

  # ==================== Frontend Lint ====================
  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npm run lint --if-present
        continue-on-error: true

  # ==================== Backend Tests ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test --if-present
        env:
          CI: true

  # ==================== Build Check ====================
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-lint]
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🏗️ Build frontend
        run: npm run build
        env:
          CI: true

      - name: ✅ Build successful
        run: echo "Build completed successfully!"
